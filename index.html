<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMaledicte — Arquitectura de Sistemas y Automatización</title>
    <meta name="description" content="Ingeniero de automatización e integraciones. Diseño arquitectura CRM/ERP, migro flujos a self-hosted y construyo tooling interno asistido por IA. Buenos Aires.">
    <meta name="author" content="Matias Martel">
    <link rel="canonical" href="https://dmaledicte.cloud">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dmaledicte.cloud">
    <meta property="og:title" content="DMaledicte — Arquitectura de Sistemas y Automatización">
    <meta property="og:description" content="Ingeniero de automatización e integraciones. Diseño arquitectura CRM/ERP, migro flujos a self-hosted y construyo tooling interno asistido por IA.">
    <meta property="og:locale" content="es_AR">

    <link rel="icon" href="/favicon.ico">

    <script>
      (function () {
        var s = localStorage.getItem('dm-theme')
        if (s === 'dark' || s === 'light') { document.documentElement.dataset.theme = s; return }
        if (window.matchMedia('(prefers-color-scheme: light)').matches) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
